<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catirobas do Inferno</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #0c0d14;
        color: #e6e6f0;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        background: #0c0d14;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" role="img" aria-label="Catirobas do Inferno — campo de batalha tático isométrico"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
